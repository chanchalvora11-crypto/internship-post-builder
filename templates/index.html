<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LinkedIn Post Generator for Interns</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
    <div id="themeToggle" class="theme-toggle" title="Toggle Dark/Light Mode">
        <span id="themeText">Dark Mode</span>
    </div>

    <div class="container">
        <header class="fade-in">
            <h1>InternPost Builder</h1>
            <p>Craft professional LinkedIn posts for your internship milestones.</p>
        </header>

        <main>
            <div class="form-card fade-in">
                <form id="postForm">
                    <div class="form-grid">
                        <div class="form-group">
                            <label for="name">Full Name</label>
                            <input type="text" id="name" name="name" required>
                        </div>
                        <div class="form-group">
                            <label for="role">Internship Role</label>
                            <input type="text" id="role" name="role" required>
                        </div>
                        <div class="form-group">
                            <label for="company">Company Name</label>
                            <input type="text" id="company" name="company" required>
                        </div>
                        <div class="form-group">
                            <label for="duration">Duration (e.g., 3 months)</label>
                            <input type="text" id="duration" name="duration" required>
                        </div>
                    </div>

                    <div class="form-group">
                        <label for="work_done">Key Work Done / Projects</label>
                        <textarea id="work_done" name="work_done" rows="3" required></textarea>
                    </div>

                    <div class="form-group">
                        <label for="skills">Skills Learned (comma separated)</label>
                        <input type="text" id="skills" name="skills" required>
                    </div>

                    <div class="form-group">
                        <label for="growth">Personal Growth / Impact</label>
                        <textarea id="growth" name="growth" rows="2" required></textarea>
                    </div>

                    <div class="form-group">
                        <label>Select Tone</label>
                        <div class="tone-options">
                            <input type="radio" id="professional" name="tone" value="professional" checked>
                            <label for="professional" class="tone-btn">Professional</label>

                            <input type="radio" id="excited" name="tone" value="excited">
                            <label for="excited" class="tone-btn">Excited</label>

                            <input type="radio" id="minimal" name="tone" value="minimal">
                            <label for="minimal" class="tone-btn">Minimal</label>
                        </div>
                    </div>

                    <button type="submit" id="generateBtn" class="primary-btn">
                        <span>Generate Post</span>
                        <div class="loader" id="loader"></div>
                    </button>
                </form>
            </div>

            <div id="outputSection" class="output-card hidden">
                <div class="card-header">
                    <h3>Your LinkedIn Post</h3>
                    <div class="action-btns">
                        <button id="downloadBtn" class="secondary-btn">Download .txt</button>
                        <button id="copyBtn" class="secondary-btn">Copy Text</button>
                    </div>
                </div>
                <div class="post-content">
                    <pre id="postOutput"></pre>
                </div>
            </div>
        </main>

        <footer>
            <p>© 2024 Internship Post Builder | Helping interns share their stories.</p>
        </footer>
    </div>

    <script src="{{ url_for('static', filename='js/script.js') }}"></script>
</body>
</html>
